<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium GPA Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card animate-up">
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 2rem;">
                <a href="{{ url_for('rules') }}" class="btn" style="width: auto; padding: 0.5rem 1rem;">🚀 Start Here</a>
            </div>

            <h1>GPA Calculator</h1>
            <p class="subtitle">Calculate your Semester and Cumulative Grade Point Average with ease.</p>
            
            <div class="choice-grid">
                <a href="{{ url_for('sgpa') }}" class="choice-card">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>Calculate SGPA</h3>
                    <p>For a single semester based on subject marks and credits.</p>
                </a>
                
                <a href="{{ url_for('cgpa') }}" class="choice-card">
                    <i class="fas fa-chart-line"></i>
                    <h3>Calculate CGPA</h3>
                    <p>Based on SGPA and credits of multiple semesters.</p>
                </a>
            </div>
        </div>
    </div>
    <footer class="footer">
        <span class="footer-text">Created by Satyam Kumar Jha <i class="fas fa-heart"></i></span>
    </footer>
</body>
</html>
