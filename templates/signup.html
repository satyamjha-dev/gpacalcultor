<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - GPA Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card animate-up">
            <h1>Create Account</h1>
            <p class="subtitle">Join us to save your calculation history.</p>

            <form action="{{ url_for('signup') }}" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
                Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login instead</a>
            </p>
        </div>
    </div>
</body>
</html>
