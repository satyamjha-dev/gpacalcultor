<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GPA Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card animate-up">
            <h1>Login</h1>
            <p class="subtitle">Access your personal GPA history.</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error-msg">{{ messages[0] }}</div>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
                New here? <a href="{{ url_for('signup') }}" style="color: var(--primary-color);">Create account</a>
            </p>
        </div>
    </div>
</body>
</html>
